<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Card</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Georgia', serif;
            padding: 20px;
            gap: 24px;
        }

        #card-image {
            width: 100%;
            max-width: 320px;
            max-height: 60vh;
            object-fit: contain;
            border-radius: 12px;
            border: 3px solid #fff;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.8);
            display: none;
        }

        #card-name {
            color: #fff;
            font-size: 1.6rem;
            font-weight: bold;
            text-align: center;
            display: none;
        }

        #add-btn {
            display: none;
            padding: 18px 48px;
            font-family: 'Georgia', serif;
            font-size: 1.3rem;
            font-weight: bold;
            background-color: #4CAF50;
            color: white;
            border: 4px solid white;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.6);
            -webkit-tap-highlight-color: transparent;
            text-decoration: none;
            text-align: center;
        }

        #add-btn:active {
            background-color: #388e3c;
            transform: scale(0.97);
        }

        #error-msg {
            color: #ff6b6b;
            font-size: 1.2rem;
            text-align: center;
            display: none;
        }

        #already-msg {
            color: #f0c040;
            font-size: 1.1rem;
            text-align: center;
            display: none;
        }

        #back-btn {
            padding: 12px 32px;
            font-family: 'Georgia', serif;
            font-size: 1rem;
            background-color: #6A3F47;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            text-decoration: none;
            text-align: center;
        }

        #back-btn:active {
            background-color: #AF6A59;
        }
    </style>
</head>
<body>
    <div id="card-name"></div>
    <img id="card-image" alt="Card">
    <div id="error-msg">Unknown card. Please scan again.</div>
    <div id="already-msg">Already in your hand!</div>
    <a id="add-btn" href="/clue/hand">Add to Hand</a>
    <a id="back-btn" href="/clue/hand">Card already in Hand</a>

    <script>
        const data = {
            weapons: ['Dagger', 'Poison', 'Rope', 'Revolver', 'Saber', 'Spear', 'Vase', 'Wine Bottle'],
            suspects: ['Greens', 'Mahoganys', 'Mustards', 'Noirs', 'Orchids', 'Peacocks', 'Plums', 'Scarlets', 'Whites'],
            rooms: ['Ballroom', 'Conservatory', 'Dining Room', 'Hall', 'Kitchen', 'Library', 'Lounge', 'Study']
        };

        const allCards = Object.values(data).flat();

        const cardImage = document.getElementById('card-image');
        const cardName = document.getElementById('card-name');
        const addBtn = document.getElementById('add-btn');
        const backBtn = document.getElementById('back-btn');
        const errorMsg = document.getElementById('error-msg');
        const alreadyMsg = document.getElementById('already-msg');

        function getQueryParam(param) {
            return new URLSearchParams(window.location.search).get(param);
        }

        const rawName = getQueryParam('card');
        const validName = allCards.find(c => c.toLowerCase() === (rawName || '').toLowerCase());

        if (!validName) {
            errorMsg.style.display = 'block';
        } else {
            const slug = validName.toLowerCase().replace(/ /g, '');
            cardImage.src = `/clue/cards/${slug}.jpg`;
            cardImage.style.display = 'block';
            cardName.textContent = validName;
            cardName.style.display = 'block';

            const hand = JSON.parse(localStorage.getItem('playerHand')) || [];
            if (hand.map(c => c.toLowerCase()).includes(validName.toLowerCase())) {
                alreadyMsg.style.display = 'block';
            } else {
                addBtn.style.display = 'block';
            }
        }

        // Save card to localStorage before the link navigates away
        addBtn.addEventListener('click', () => {
            if (!validName) return;
            const hand = JSON.parse(localStorage.getItem('playerHand')) || [];
            if (!hand.map(c => c.toLowerCase()).includes(validName.toLowerCase())) {
                hand.push(validName);
                localStorage.setItem('playerHand', JSON.stringify(hand));
            }
        });
    </script>
</body>
</html>
