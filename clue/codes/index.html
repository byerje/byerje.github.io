<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code List</title>
    <link rel="stylesheet" href="/clue/clue/styles.css">
    <style>
        body {
            align-items: center;
        }

        h1 {
            font-size: 2.5rem;
            color: #6A3F47;
        }

        .category {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            margin-bottom: 20px;
            padding: 20px;
            border: 3px solid #6A3F47;
            border-radius: 10px;
            background-color: #fff;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .category h2 {
            font-size: 2rem;
            color: #AF6A59;
            margin-bottom: 20px;
            text-align: center;
        }

        .qr-list {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            width: 100%;
        }

        .qr-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 25px;
            border: 2px solid #AF6A59;
            border-radius: 10px;
            background-color: #fff;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .qr-item img {
            width: 200px;
            height: 200px;
            margin-bottom: 10px;
        }

        .qr-item .label {
            font-size: 1rem;
            font-weight: bold;
            color: #6A3F47;
        }

        a {
            text-decoration: none;
            color: inherit;
        }
    </style>
</head>
<body>
    <div class="category">
        <div class="button-container">
            <a href="/clue/cardadd" class="btn-nav">
                ← Back to Previous Page
            </a>

            <!-- Print Button -->
            <button onclick="window.print()" class="btn-nav">
                Print Page
            </button>    
        </div>
    </div>

    <div id="categories"></div>

    <script>
        const data = {
            weapons: ['Dagger', 'Poison', 'Rope', 'Revolver','Saber','Spear','Vase','Wine Bottle'],
            suspects: ['Greens','Mahoganys','Mustards','Noirs','Orchids','Peacocks','Plums','Scarlets','Whites'],
            rooms: ['Ballroom', 'Conservatory', 'Dining Room', 'Hall', 'Kitchen', 'Library', 'Lounge', 'Study']
        };

        const categoriesContainer = document.getElementById('categories');

        for (const [category, items] of Object.entries(data)) {
            const sortedItems = items.sort((a, b) => a.localeCompare(b));

            const categoryDiv = document.createElement('div');
            categoryDiv.className = 'category';

            categoryDiv.innerHTML = `<h2>${category.charAt(0).toUpperCase() + category.slice(1)}</h2>`;

            const qrList = document.createElement('div');
            qrList.className = 'qr-list';

            sortedItems.forEach(item => {
                const qrItem = document.createElement('div');
                qrItem.className = 'qr-item';

                qrItem.innerHTML = `
                    <a href='/clue/hand?card=${item}'>
                        <img src="/clue/codes/${item.toLowerCase().replace(/ /g, '')}.png" alt="${item} QR Code">
                    </a>
                    <div class="label"><a href='/clue/hand?card=${item}'>${item}</a></div>
                `;

                qrList.appendChild(qrItem);
            });

            categoryDiv.appendChild(qrList);
            categoriesContainer.appendChild(categoryDiv);
        }
    </script>
</body>
</html>
