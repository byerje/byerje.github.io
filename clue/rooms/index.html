<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secrets</title>
    <link rel="stylesheet" href="/clue/clue/styles.css">
    <style>
        body {
            align-items: center;
        }

        .img-list {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            width: 100%;
        }

        .img-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 25px;
            border: 2px solid #AF6A59;
            border-radius: 10px;
            background-color: #fff;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .img-item img {
            width: 200px;
            height: 200px;
            margin-bottom: 10px;
        }

        .img-item .label {
            font-size: 1rem;
            font-weight: bold;
            color: #6A3F47;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        img {
            width: 150;
            height: 150;
            border-radius: 10px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="panel">

        <h1>Rooms</h1>

        <p>
            <a href="/clue/index" class="btn-nav">
                ← Back to Home Page
            </a>
        </p>

        <div id="rooms"></div>
    </div>

    <script>
        const data = {
            rooms: ['Ballroom', 'Conservatory', 'Dining Room', 'Hall', 'Kitchen', 'Library', 'Lounge', 'Study']
        };

        const roomsContainer = document.getElementById('rooms');

        // Show rooms
        for (const [category, items] of Object.entries(data)) {
            // Sort items alphabetically
            const sortedItems = items.sort((a, b) => a.localeCompare(b));

            // Create a section
            const roomsDiv = document.createElement('div');
            roomsDiv.className = 'rooms';

            // Add list of room images
            const imgList = document.createElement('div');
            imgList.className = 'img-list';

            sortedItems.forEach(item => {
                const imgItem = document.createElement('div');
                imgItem.className = 'img-item';

                imgItem.innerHTML = `
                    <div class="label"><a href='/clue/card?card=${item}'>${item}</a></div>
                    <img src="/clue/rooms/${item.toLowerCase().replace(/ /g, '')}.jpg" alt="${item}">
                `;

                imgList.appendChild(imgItem);
            });

            roomsDiv.appendChild(imgList);
            roomsContainer.appendChild(roomsDiv);
        }
    </script>
</body>
</html>
