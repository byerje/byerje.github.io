<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Scanner</title>
    <link rel="stylesheet" href="/clue/clue/styles.css">
    <style>
        body {
            align-items: center;
        }

        h1 {
            margin-bottom: 20px;
            color: #6A3F47;
        }

        #qr-video {
            width: 100%;
            max-width: 300px;
            border: 2px solid black;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .card-display {
            font-size: 1.2rem;
            font-weight: bold;
            margin: 20px 0;
            color: #AF6A59;
        }

        .input-group {
            margin: 20px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        input[type="text"] {
            font-size: 1rem;
            padding: 10px;
            width: 300px;
            border: 2px solid #6A3F47;
            border-radius: 5px;
        }

        button {
            padding: 10px 20px;
            font-size: 1rem;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        #status {
            margin-top: 20px;
            font-size: 1.2em;
            color: #6A3F47;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>
</head>
<body>
    <div>
        <a href="/clue/hand" class="btn-nav">
            ← Back to Previous Page
        </a>
        <!-- <a href="/clue/codes" class="btn-nav">
            QR Codes
        </a> -->
        
    </div>

    <!-- <div class="card-display" id="card-display">Card: None</div> -->
    
    <div class="input-group">
        <input type="text" id="url-input" placeholder="Scanned URL will appear here">
    </div>
    <div>
        <button id="go-button">Go to URL</button>
    </div>
    
    <div id="status">Point your camera at a QR code</div>
    
    <div>
        <video id="qr-video" autoplay></video>
    </div>

    <script>
        const video = document.getElementById("qr-video");
        const cardDisplay = document.getElementById("card-display");
        const urlInput = document.getElementById("url-input");
        const goButton = document.getElementById("go-button");
        const statusDiv = document.getElementById("status");
        const canvas = document.createElement("canvas");
        const context = canvas.getContext("2d");

        let scanning = true;

        // Start the video stream
        async function startVideo() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
                scanning = true;
            } catch (err) {
                console.error("Error accessing the camera:", err);
                statusDiv.textContent = "Unable to access the camera. Please check your permissions.";
            }
        }

        // Extract card name from a QR code URL like:
        // https://byerje.github.io/clue/cards/dagger.jpg  -> "dagger"
        // or a legacy ?card=Dagger query param URL
        function getCardSlugFromUrl(url) {
            try {
                const parsedUrl = new URL(url);
                // Legacy format: ?card=Dagger
                const param = parsedUrl.searchParams.get("card");
                if (param) return param;
                // Image URL format: /clue/cards/<slug>.jpg
                const match = parsedUrl.pathname.match(/\/clue\/cards\/([^/.]+)\.jpg$/i);
                if (match) return match[1];
            } catch {
                // not a valid URL
            }
            return null;
        }

        // QR Code scanning function
        function scanQRCode() {
            if (!scanning) return;

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
            const qrCode = jsQR(imageData.data, canvas.width, canvas.height);

            if (qrCode) {
                scanning = false;
                urlInput.value = qrCode.data;
                statusDiv.textContent = "QR Code detected. Redirecting...";

                const slug = getCardSlugFromUrl(qrCode.data);
                if (slug) {
                    window.location.href = `/clue/card?card=${encodeURIComponent(slug)}`;
                } else {
                    // Fallback: go to scanned URL directly
                    window.location.href = qrCode.data;
                }
            } else {
                statusDiv.textContent = "Scanning for QR codes...";
                requestAnimationFrame(scanQRCode);
            }
        }

        // Navigate to the URL on button click
        goButton.addEventListener("click", () => {
            const url = urlInput.value;
            if (isValidUrl(url)) {
                window.location.href = url;
            } else {
                alert("The entered text is not a valid URL.");
            }
        });

        // Validate URLs
        function isValidUrl(string) {
            try {
                new URL(string);
                return true;
            } catch {
                return false;
            }
        }

        // Start scanning when the video feed is ready
        video.addEventListener("loadeddata", scanQRCode);

        // Start the video stream on page load
        startVideo();
    </script>
</body>
</html>
