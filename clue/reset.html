<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset</title>
    <link rel="stylesheet" href="/clue/clue/styles.css">
</head>
<body>
    <script>
      localStorage.removeItem('playerHand');
      localStorage.removeItem('playerName');
      localStorage.removeItem('motives');
      // Verify storage was cleared before navigating
      if (!localStorage.getItem('playerHand')) {
          window.location.replace('/clue/hand');
      } else {
          localStorage.clear();
          window.location.replace('/clue/hand');
      }
    </script>
</body>
</html>
