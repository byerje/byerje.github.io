<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games by Jim Byer</title>
    <style>
        body {
            font-family: 'Georgia', serif;
            background-color: #f9f5f0;
            color: #333;
            margin: 0;
            padding: 20px 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            flex-direction: column;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .invitation {
            background-color: #fff;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            width: 80%;
            max-width: 600px;
            padding: 20px;
            margin: 0 auto;
            text-align: center;
        }

        .invitation h1 {
            font-size: 2.5rem;
            color: #6A3F47;
            margin-bottom: 10px;
        }

        .invitation p {
            font-size: 1.2rem;
            margin: 10px 0 30px 0;
            color: #555;
        }

        .game-menu {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .game-menu li {
            margin: 15px 0;
        }

        .game-menu a {
            font-size: 1.4rem;
            color: #6A3F47;
            text-decoration: none;
            border-bottom: 2px solid transparent;
            transition: border-color 0.2s, color 0.2s;
        }

        .game-menu a:hover {
            color: #AF6A59;
            border-bottom-color: #AF6A59;
        }

        .section-heading {
            font-size: 1.1rem;
            color: #AF6A59;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin: 25px 0 5px 0;
        }
    </style>
</head>
<body>
    <div class="invitation">
        <h1>Games by Jim Byer</h1>
        <p>Choose a project to begin:</p>

        <p class="section-heading">Murder Mystery Games</p>
        <ul class="game-menu">
            <li><a href="/byermanor/" target="_blank" rel="noopener noreferrer">Byer Manor</a></li>
            <li><a href="/clue/" target="_blank" rel="noopener noreferrer">Clue-like Mystery</a></li>
            <li><a href="/hinesmansion/" target="_blank" rel="noopener noreferrer">Hines Mansion</a></li>
            <li><a href="http://fatalattraction.azurewebsites.net/" target="_blank" rel="noopener noreferrer">Fatal Attraction</a></li>
            <li><a href="https://byerje.github.io/MMDP2026" target="_blank" rel="noopener noreferrer">Silver Serpent Speakeasy Murder Mystery</a></li>
        </ul>

        <p class="section-heading">Other Projects</p>
        <ul class="game-menu">
            <li><a href="https://talktojosephsmith.azurewebsites.net/" target="_blank" rel="noopener noreferrer">Talk to Joseph Smith</a></li>
            <li><a href="https://byerje.github.io/chatbuddy" target="_blank" rel="noopener noreferrer">Chat Buddy</a></li>
        </ul>
    </div>
</body>
</html>
